name: Update KULMS+ User Count

on:
  schedule:
    - cron: '0 0 * * *' # 毎日 UTC 0:00 に実行
  workflow_dispatch: # 手動トリガー

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch user count from Chrome Web Store
        id: fetch
        run: |
          JSON=$(curl -sf "https://img.shields.io/chrome-web-store/users/akfadmompgbhncnocomalofhcihpejjb.json")
          VALUE=$(echo "$JSON" | jq -r '.value')
          echo "raw=$VALUE" >> "$GITHUB_OUTPUT"

          # Parse abbreviated value: "4k" -> 4000, "12.5k" -> 12500, "1M" -> 1000000
          if [[ "$VALUE" == *k ]]; then
            NUM=$(echo "$VALUE" | sed 's/k//' | awk '{printf "%.0f", $1 * 1000}')
          elif [[ "$VALUE" == *M ]]; then
            NUM=$(echo "$VALUE" | sed 's/M//' | awk '{printf "%.0f", $1 * 1000000}')
          else
            NUM=$(echo "$VALUE" | tr -d ', ')
          fi
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

      - name: Update README.md (typing SVG)
        env:
          NUM: ${{ steps.fetch.outputs.num }}
        run: |
          # Update the typing SVG URL: KULMS%2B+%7C+XXXX%2B+Users
          sed -i -E "s/KULMS%2B\+%7C\+[0-9]+%2B\+Users/KULMS%2B+%7C+${NUM}%2B+Users/g" README.md

      - name: Update hero-banner.svg
        env:
          NUM: ${{ steps.fetch.outputs.num }}
        run: |
          # Update the metric value in SVG: >XXXX+<
          sed -i -E "s/(class=\"metric-value\">)[0-9,]+\+/\1${NUM}+/g" assets/hero-banner.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/hero-banner.svg
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "chore: update KULMS+ user count to ${{ steps.fetch.outputs.num }}"
            git push
          fi
